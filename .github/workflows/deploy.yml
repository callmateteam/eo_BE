name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "prisma/**"
      - "requirements.txt"
      - "Dockerfile"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/eo-be

            # 최신 코드 pull
            git pull origin main

            # .env 생성 (GitHub Secrets 기반)
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            echo "DEBUG=${{ secrets.DEBUG }}" >> .env
            echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
            echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> .env
            echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
            echo "S3_BUCKET=${{ secrets.S3_BUCKET }}" >> .env
            echo 'ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}' >> .env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
            echo "COOKIE_SECURE=${{ secrets.COOKIE_SECURE }}" >> .env

            # 빌드 전 디스크 정리
            docker builder prune -af
            docker image prune -af

            # Docker 빌드 및 재시작
            docker build -t eo-api .
            docker stop eo-api || true
            docker rm eo-api || true
            docker run -d \
              --name eo-api \
              --restart unless-stopped \
              --env-file .env \
              -e TZ=Asia/Seoul \
              -p 8000:8000 \
              eo-api

            # 헬스체크
            sleep 3
            curl -f http://localhost:8000/docs || echo "WARNING: Health check failed"

            # 이전 이미지 정리
            docker image prune -f

            echo "Deploy completed successfully!"
