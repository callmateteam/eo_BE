services:
  api:
    build: .
    container_name: eo-backend
    ports:
      - "8000:8000"
    environment:
      TZ: Asia/Seoul
    env_file:
      - .env
    entrypoint: ""
    command: sh -c "python -m prisma db push --accept-data-loss && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
