services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      TZ: Asia/Seoul
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eo
      POSTGRES_USER: eo
      POSTGRES_PASSWORD: eo_local_dev
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
